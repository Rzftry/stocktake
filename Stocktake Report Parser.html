<script>

// ===== VARIABLES =====

let allTotals = [];

'';

document.getElementById('dropZone');

============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    

btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove

('active'));
        this.classList.add('active');

tc.classList.remove('active'));

// 

============================================================

============================================================
browseBtn.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {

});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', 

(e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        

fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));

removeFileBtn.addEventListener('click', () => {
    fileInput.value = '';

statusEl.className = '';

// 

============================================================
// ===== UTILITY FUNCTIONS =====
// 

============================================================
function log(msg) {
    debugLog.push(msg);
    console.log(msg);
}

function toNum(x) {
    if (!x) return 0;
    x = x.toString().trim();
    let isNeg = false;
    if (x.endsWith('-')) { isNeg = 

true; x = x.slice(0, -1); }
    x = x.replace(/,/g, '').trim();
    let num = parseFloat(x) || 0;
    return isNeg ? -num : num;
}

function showVal(n) {
    n = Number(n || 0);
    if (n === 0) return '-';
    return n.toFixed(2);
}

function showStatus(msg, type) 

{
    statusEl.className = 'show ' + type;
    statusMsg.textContent = msg;
    statusEl.style.display = 'flex';
}

function 

findSkuInLine(line) {
    const match = line.match(/\b(\d{8})\b/);
    if (match) return match[1];
    return null;
}

function 

extractDeptInfo(line, sku) {
    const deptMatch = line.match(/^(\d+)\s+/);
    if (!deptMatch) return null;
    
    const 

deptCode = deptMatch[1];
    const beforeSku = line.substring(0, line.indexOf(sku)).trim();
    let deptPart = beforeSku.replace

(/^\d+\s+/, '').trim();
    
    let parts = deptPart.split(/\s{2,}/);
    let deptName = '', brand = '';
    
    if (parts.length 

>= 2) {
        deptName = parts[0].trim();
        brand = parts.slice(1).join(' ').trim();
    } else {
        let singleParts = 

deptPart.split(/\s+/);
        if (singleParts.length >= 3) {
            deptName = singleParts.slice(0, 2).join(' ');
           

 brand = singleParts.slice(2).join(' ');
        } else if (singleParts.length === 2) {
            deptName = singleParts[0];
    

        brand = singleParts[1];
        } else {
            deptName = deptPart;
            brand = '';
        }
    }
    
    

return { dept: deptCode, deptName: deptName, brand: brand };
}

// ============================================================
// 

===== EXTRACT DATA =====
// ============================================================
function extractData(line, isRA4A) {
    

const nums = line.match(/[\d.]+-?/g);
    if (!nums) return null;
    
    const parsed = nums.map(toNum);
    
    if (isRA4A) {
    

    if (parsed.length >= 12) {
            return {
                act_qty: 0, act_cost: parsed[0] || 0, act_retail: parsed[1] 

|| 0, act_mo: parsed[2] || 0,

0,

var_qty: 0, var_cost: parsed[9] || 0, var_retail: parsed[10] || 0, var_mo: parsed[11] || 0
            };
        } else if 

(parsed.length === 11) {
            return {

act_mo: parsed[2] || 0,
                ri_qty: 0, ri_cost: parsed[3] || 0, ri_retail: parsed[4] || 0, ri_mo: parsed[5] || 0,
    

            adj_qty: 0, adj_cost: parsed[6] || 0, adj_retail: parsed[7] || 0, adj_mo: 0,
                var_qty: 0, var_cost: 

parsed[8] || 0, var_retail: parsed[9] || 0, var_mo: parsed[10] || 0
            };
        } else if (parsed.length >= 9) {
       

     return {

      ri_qty: 0, ri_cost: parsed[3] || 0, ri_retail: parsed[4] || 0, ri_mo: parsed[5] || 0,

adj_cost: 0, adj_retail: 0, adj_mo: 0,
                var_qty: 0, var_cost: parsed[6] || 0, var_retail: parsed[7] || 0, var_mo: 

parsed[8] || 0
            };
        } else if (parsed.length >= 6) {
            return {
                act_qty: 0, act_cost: 

parsed[0] || 0, act_retail: parsed[1] || 0, act_mo: parsed[2] || 0,
                ri_qty: 0, ri_cost: parsed[3] || 0, 

ri_retail: parsed[4] || 0, ri_mo: parsed[5] || 0,
                adj_qty: 0, adj_cost: 0, adj_retail: 0, adj_mo: 0,
             

   var_qty: 0, var_cost: 0, var_retail: 0, var_mo: 0
            };
        }
    } else {
        if (parsed.length >= 12) {
       

     return {
                act_qty: parsed[0] || 0, act_cost: parsed[1] || 0, act_retail: parsed[2] || 0, act_mo: parsed[3] 

|| 0,
                ri_qty: parsed[4] || 0, ri_cost: parsed[5] || 0, ri_retail: parsed[6] || 0, ri_mo: parsed[7] || 0,
         

       adj_qty: 0, adj_cost: 0, adj_retail: 0, adj_mo: 0,
                var_qty: parsed[8] || 0, var_cost: parsed[9] || 0, 

var_retail: parsed[10] || 0, var_mo: parsed[11] || 0
            };

// ===== PROCESS FILE =====
// 

============================================================
function processFile(file) {
    if (!file.name.endsWith('.txt')) {
  

      showStatus('❌ Sila muat naik fail .txt', 'error');
        return;
    }
    
    debugLog = [];
    reportRows = [];
    

allTotals = [];
    brandTotals = [];
    deptTotals = [];
    divisionTotals = [];
    storeTotals = [];
    companyTotals = [];
    
    showStatus('⏳ Memproses fail...', 'info');
    
    const reader = new FileReader();
    reader.onload = function(e) {
        

try {
            const text = e.target.result;
            const lines = text.split('\n');
            
            const 

hasOutrgt = text.includes('Outrgt :');
            const hasOutright = text.includes('Outright:');
            
            if 

(hasOutrgt) {
                format = 'RA4A';
                parseRA4A(lines);
            } else if (hasOutright) {
             

   format = 'RA04';
                parseRA04(lines);
            } else {
                showStatus('❌ Tiada data ditemui. 

Pastikan format laporan betul.', 'error');
                exportBtn.disabled = true;
                previewBtn.disabled = true;
 

               return;
            }
            
            if (reportRows.length === 0 && allTotals.length === 0) {
             

   showStatus('❌ Tiada data ditemui', 'error');
                exportBtn.disabled = true;
                previewBtn.disabled = 

true;
                return;
            }
            
            fileName = file.name.replace('.txt', '');
            

showStatus(`✅ ${reportRows.length} rows, ${allTotals.length} totals (${format})`, 'success');
            exportBtn.disabled = 

false;
            previewBtn.disabled = false;
            updateSummary();
            renderAll();
            
        } catch

(err) {
            showStatus('❌ Error: ' + err.message, 'error');
            exportBtn.disabled = true;
            

previewBtn.disabled = true;
        }
    };
    reader.readAsText(file);
}

            'Act Retail': 

r.ar === 0 ? '-' : (r.ar||0).toFixed(2),
            'Act MO%': r.am === 0 ? '-' : (r.am||0).toFixed(2),
            'RI Cost': 

r.rc === 0 ? '-' : (r.rc||0).toFixed(2),
            'RI Retail': r.rr === 0 ? '-' : (r.rr||0).toFixed(2),
            'RI MO%': 

r.rm === 0 ? '-' : (r.rm||0).toFixed(2),
            'Adj Cost': r.adjc === 0 ? '-' : (r.adjc||0).toFixed(2),
            'Adj 

Retail': r.adjr === 0 ? '-' : (r.adjr||0).toFixed(2),
            'Adj MO%': r.adjm === 0 ? '-' : (r.adjm||0).toFixed(2),
        

    'Var Cost': r.vc === 0 ? '-' : (r.vc||0).toFixed(2),
            'Var Retail': r.vr === 0 ? '-' : (r.vr||0).toFixed(2),
      

      'Var MO%': r.vm === 0 ? '-' : (r.vm||0).toFixed(2)
        };
    } else {
        return {
            ...base,
            

'Act Qty': r.aq === 0 ? '-' : (r.aq||0).toFixed(2),
            'Act Cost': r.ac === 0 ? '-' : (r.ac||0).toFixed(2),
            

'Act Retail': r.ar === 0 ? '-' : (r.ar||0).toFixed(2),
            'Act MO%': r.am === 0 ? '-' : (r.am||0).toFixed(2),
           

 'RI Qty': r.rq === 0 ? '-' : (r.rq||0).toFixed(2),
            'RI Cost': r.rc === 0 ? '-' : (r.rc||0).toFixed(2),
            

'RI Retail': r.rr === 0 ? '-' : (r.rr||0).toFixed(2),
            'RI MO%': r.rm === 0 ? '-' : (r.rm||0).toFixed(2),
            

'Var Qty': r.vq === 0 ? '-' : (r.vq||0).toFixed(2),
            'Var Cost': r.vc === 0 ? '-' : (r.vc||0).toFixed(2),
            

'Var Retail': r.vr === 0 ? '-' : (r.vr||0).toFixed(2),
            'Var MO%': r.vm === 0 ? '-' : (r.vm||0).toFixed(2)
        };
  

  }
}

// ============================================================
// ===== GET HEADERS =====
// 

============================================================
function getHeaders(isRA4A) {
    const common = ["#","Dept","Dept 

Name","Brand","SKU","Description","Type"];
    if (isRA4A) {
        return [
            ...common,
            "Act Cost","Act 

Retail","Act MO%",
            "RI Cost","RI Retail","RI MO%",
            "Adj Cost","Adj Retail","Adj MO%",
            "Var 

Cost","Var Retail","Var MO%"
        ];
    } else {
        return [
            ...common,
            "Act Qty","Act Cost","Act 

Retail","Act MO%",
            "RI Qty","RI Cost","RI Retail","RI MO%",
            "Var Qty","Var Cost","Var Retail","Var MO%"
   

     ];
    }
}

// ============================================================
// ===== EXPORT EXCEL =====
// 

============================================================
function exportExcel() {
    if (reportRows.length === 0) {
        

showStatus('❌ Tiada data', 'error');
        return;
    }
    
    try {
        const wb = XLSX.utils.book_new();
        const 

filter = typeFilter.value;
        const isRA4A = format === 'RA4A';
        
        const filtered = reportRows.filter(r => {
    

        if (r.isTotal) return true;
            if (filter === 'outright') return r.typeLabel === 'Outright' || r.typeLabel === 

'';
            if (filter === 'csgnmnt') return r.typeLabel === 'Consignment';
            return true;
        });
        
       

 // 1. ALL DATA
        let rowNum = 0;
        const allRows = filtered.map(r => { rowNum++; return formatRow(r, isRA4A, 

rowNum); });
        const wsAll = XLSX.utils.json_to_sheet(allRows, { header: getHeaders(isRA4A) });
        

XLSX.utils.book_append_sheet(wb, wsAll, "ALL DATA");
        
        // 2. VARIANCE ONLY
        const varFiltered = 

filtered.filter(r => {
            if (r.isTotal) return r.vc !== 0 || r.vr !== 0 || r.vq !== 0;
            return r.vq !== 0 || 

r.vc !== 0 || r.vr !== 0;
        });
        const varRows = varFiltered.map((r, idx) => formatRow(r, isRA4A, idx + 1));
        

if (varRows.length > 0) {
            const wsVar = XLSX.utils.json_to_sheet(varRows, { header: getHeaders(isRA4A) });
           

 XLSX.utils.book_append_sheet(wb, wsVar, "VARIANCE ONLY");
        }
        
        // 3. DEPT TOTAL ONLY
        const 

deptTotalFiltered = filtered.filter(r => r.isTotal === true && r.subType === 'Department');
        const deptTotalRows = 

deptTotalFiltered.map((r, idx) => formatRow(r, isRA4A, idx + 1));
        if (deptTotalRows.length > 0) {
            const 

wsDeptTotal = XLSX.utils.json_to_sheet(deptTotalRows, { header: getHeaders(isRA4A) });
            XLSX.utils.book_append_sheet

(wb, wsDeptTotal, "DEPT TOTAL ONLY");
        }
        
        // 4. SPLIT BY DEPT
        const deptMap = {};
        

filtered.forEach(r => {
            if (!r.isTotal) {
                const key = (r.dept || 'NO') + ' - ' + (r.deptName || 

'DEPT');
                if (!deptMap[key]) deptMap[key] = [];
                deptMap[key].push(r);
            }
        });
      

  
        function calculateBrandTotal(deptRows, brand) {
            const brandRows = deptRows.filter(r => r.brand === brand);
 

           let total = { ac:0, ar:0, am:0, rc:0, rr:0, rm:0, adjc:0, adjr:0, adjm:0, vc:0, vr:0, vm:0, aq:0, rq:0, vq:0 };
      

      brandRows.forEach(r => {
                if (isRA4A) {
                    total.ac += r.ac||0; total.ar += r.ar||0; 

total.am += r.am||0;
                    total.rc += r.rc||0; total.rr += r.rr||0; total.rm += r.rm||0;
                    

total.adjc += r.adjc||0; total.adjr += r.adjr||0; total.adjm += r.adjm||0;
                    total.vc += r.vc||0; total.vr += 

r.vr||0; total.vm += r.vm||0;
                } else {
                    total.aq += r.aq||0; total.ac += r.ac||0; total.ar += 

r.ar||0; total.am += r.am||0;
                    total.rq += r.rq||0; total.rc += r.rc||0; total.rr += r.rr||0; total.rm += 

r.rm||0;
                    total.vq += r.vq||0; total.vc += r.vc||0; total.vr += r.vr||0; total.vm += r.vm||0;
                

}
            });
            return total;
        }
        
        Object.keys(deptMap).forEach(deptKey => {
            const 

deptRows = deptMap[deptKey];
            const rows = [];
            let rowCounter = 0;
            const deptCode = deptRows

[0]?.dept || '';
            const deptName = deptRows[0]?.deptName || '';
            
            const brands = [...new Set

(deptRows.map(r => r.brand).filter(b => b))];
            
            brands.forEach(brand => {
                const 

brandProducts = deptRows.filter(r => r.brand === brand);
                brandProducts.forEach(r => {
                    

rowCounter++;
                    rows.push(formatRow(r, isRA4A, rowCounter));
                });
                
                

let brandTotal = filtered.find(r => r.isTotal && r.subType === 'Brand' && r.name === brand);
                if (!brandTotal) {
  

                  const calculated = calculateBrandTotal(deptRows, brand);
                    brandTotal = {
                    

    isTotal: true, subType: 'Brand', name: brand,
                        ac: calculated.ac, ar: calculated.ar, am: 

calculated.am,
                        rc: calculated.rc, rr: calculated.rr, rm: calculated.rm,
                        adjc: 

calculated.adjc, adjr: calculated.adjr, adjm: calculated.adjm,
                        vc: calculated.vc, vr: calculated.vr, vm: 

calculated.vm,
                        aq: calculated.aq, rq: calculated.rq, vq: calculated.vq,
                        dept: 

deptCode, deptName: deptName, brand: brand
                    };
                }
                rows.push({});
                

rowCounter++;
                rows.push(formatRow(brandTotal, isRA4A, rowCounter));
            });
            
            // 

Department Total
            const deptTotal = filtered.find(r => r.isTotal && r.subType === 'Department' && (r.name.includes

(deptCode) || r.name.includes(deptName)));
            if (deptTotal) {
                rows.push({});
                rowCounter

++;
                rows.push(formatRow(deptTotal, isRA4A, rowCounter));
            } else {
                let deptCalc = { 

ac:0, ar:0, rc:0, rr:0, adjc:0, adjr:0, vc:0, vr:0, aq:0, rq:0, vq:0 };
                deptRows.forEach(r => {
                  

  if (isRA4A) {
                        deptCalc.ac += r.ac||0; deptCalc.ar += r.ar||0;
                        deptCalc.rc += 

r.rc||0; deptCalc.rr += r.rr||0;
                        deptCalc.adjc += r.adjc||0; deptCalc.adjr += r.adjr||0;
                 

       deptCalc.vc += r.vc||0; deptCalc.vr += r.vr||0;
                    } else {
                        deptCalc.aq += 

r.aq||0; deptCalc.ac += r.ac||0; deptCalc.ar += r.ar||0;
                        deptCalc.rq += r.rq||0; deptCalc.rc += r.rc||0; 

deptCalc.rr += r.rr||0;
                        deptCalc.vq += r.vq||0; deptCalc.vc += r.vc||0; deptCalc.vr += r.vr||0;
          

          }
                });
                const fakeDeptTotal = {
                    isTotal: true, subType: 'Department', 

name: 'Department Total',
                    ...deptCalc, dept: deptCode, deptName: deptName, brand: ''
                };
       

         rows.push({});
                rowCounter++;
                rows.push(formatRow(fakeDeptTotal, isRA4A, rowCounter));
    

        }
            
            // Division, Store, Company Total
            ['Division','Store','Company'].forEach(type => {
  

              const total = filtered.find(r => r.isTotal && r.subType === type);
                if (total) {
                    

rows.push({});
                    rowCounter++;
                    rows.push(formatRow(total, isRA4A, rowCounter));
             

   }
            });
            
            const ws = XLSX.utils.json_to_sheet(rows, { header: getHeaders(isRA4A) });
           

 let sheetName = deptKey.substring(0, 31);
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
        });
        
       

 // 5. EXPORT
        const today = new Date().toISOString().slice(0,10);
        const exportName = `${fileName || 'stocktake'}

_${today}.xlsx`;
        XLSX.writeFile(wb, exportName);
        showStatus(`✅ Export berjaya: ${exportName}`, 'success');
       

 
    } catch(err) {
        showStatus('❌ Export error: ' + err.message, 'error');
    }
}

console.log('📊 Stocktake Parser PRO loaded.

</script>
