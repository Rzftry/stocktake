<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ERP Stock Report PRO (FIXED)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body { font-family: Arial; font-size: 11px; padding: 12px; background:#f4f6f9; }

table { border-collapse: collapse; width: 100%; background:#fff; }

th,td{
    border:1px solid #333;
    padding:4px;
    font-size:11px;
    text-align:center;
}

thead th{
    position:sticky;
    top:0;
    background:#fff;
    z-index:5;
}

.group-actual{background:#cfe8ff;font-weight:bold;}
.group-ri{background:#d6f5d6;font-weight:bold;}
.group-var{background:#ffd6d6;font-weight:bold;}

.duplicate{background:#fff3cd!important;border:2px solid red!important;}
.pos{color:green;font-weight:bold;}
.neg{color:red;font-weight:bold;}
.total-row{background:#e2e3e5;font-weight:bold;}
</style>
</head>

<body>

<h2>ERP STOCK REPORT PRO (FIXED VERSION)</h2>

<input type="file" id="fileInput">
<button onclick="exportExcel()">EXPORT</button>

<select id="typeFilter">
<option value="both">Both</option>
<option value="outright" selected>Outright</option>
<option value="csgnmnt">Csgnmnt</option>
</select>

<table>
<thead>
<tr>
<th>Dept</th><th>Department</th><th>Brand</th>
<th>SKU</th><th>Description</th><th>Type</th>

<th colspan="4" class="group-actual">ACT</th>
<th colspan="4" class="group-ri">RI</th>
<th colspan="4" class="group-var">VAR</th>
</tr>

<tr>
<th colspan="6"></th>
<th>Qty</th><th>Cost</th><th>Retail</th><th>MO%</th>
<th>Qty</th><th>Cost</th><th>Retail</th><th>MO%</th>
<th>Qty</th><th>Cost</th><th>Retail</th><th>MO%</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

let data = [];
let fileName = "ERP";

// ===================== FILE INPUT =====================
document.getElementById("fileInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;

    fileName = file.name.split('.')[0];

    const reader = new FileReader();
    reader.onload = e => parse(e.target.result);
    reader.readAsText(file);
});

// ===================== FILTER =====================
document.getElementById("typeFilter").addEventListener("change", render);

// ===================== CLEAN =====================
function clean(v){
    return (v||"").toString().trim().toUpperCase();
}

// ===================== NUMBER FIX (IMPORTANT) =====================
function toNum(x){
    if(!x) return 0;

    x = x.toString().trim();

    // weird minus fix
    x = x.replace(/[–−]/g,'-');

    // ERP trailing minus (1.00-)
    let isNeg = false;
    if(x.endsWith('-')){
        isNeg = true;
        x = x.slice(0,-1);
    }

    x = x.replace(/,/g,'').trim();

    let num = parseFloat(x) || 0;

    return isNeg ? -num : num;
}

// ===================== FORMAT =====================
function fmt(n){
    return Number(n || 0).toFixed(2);
}

function fmtInt(n){
    return Math.round(Number(n || 0));
}

// ===================== PARSE =====================
function parse(text){

    const lines = text.split(/\r?\n/);
    data = [];

    let ctx = {};
    let seen = new Set();
    let pendingTotal = null;

    for(let line of lines){

        line = line.replace(/\f/g,'').trim();
        if(!line) continue;

        if(line.includes("PAGE") || line.includes("Report Code")) continue;

        // TOTAL header detect
        if(
            line.toUpperCase().includes("TOTAL") &&
            !line.match(/^(Outright|Csgnmnt)\s*:/i)
        ){
            pendingTotal = line;
            continue;
        }

        // TOTAL values
        let totalMatch = line.match(/^(Outright|Csgnmnt)\s*:\s*(.*)$/i);
        if(pendingTotal && totalMatch){

            let nums = totalMatch[2].split(/\s+/).map(toNum);

            data.push({
    totalRow: true,
    dept: ctx.dept || "",
    department: ctx.department || "",
    totalText: pendingTotal,
    type: totalMatch[1],
    values: nums
});

            pendingTotal = null;
            continue;
        }

        // PRODUCT HEADER
        let p = line.match(/^(\d+)\s+(.+?)\s+(\d+)\s+(.+)$/);
        if(p){
            let parts = p[2].split(/\s{2,}/);

            ctx = {
                dept: p[1],
                department: parts[0] || "",
                brand: parts[1] || "",
                sku: p[3],
                description: p[4]
            };
            continue;
        }

        // STOCK LINE
        let s = line.match(/^(Outright|Csgnmnt)\s*:\s*(.*)$/i);
        if(s){

            let nums = s[2].split(/\s+/).map(toNum);

            let row = {
                ...ctx,
                type: s[1],

                act_qty: nums[0], act_cost: nums[1], act_retail: nums[2], act_mo: nums[3],
                ri_qty: nums[4], ri_cost: nums[5], ri_retail: nums[6], ri_mo: nums[7],
                var_qty: nums[8], var_cost: nums[9], var_retail: nums[10], var_mo: nums[11]
            };

            let key = clean(row.dept + row.brand + row.sku + row.type);
            row.dup = seen.has(key);
            seen.add(key);

            data.push(row);
        }
    }

    render();
}


// // ===================== TOTAL ROW HANDLER =====================
 function isBrandTotal(r){
    // brand total jika totalText ada perkataan brand name
    // Contoh: "TOTAL NIKE" → treat as brand total
    const txt = (r.totalText || "").toUpperCase();
    if(!txt.includes("TOTAL")) return false;

    // Kita anggap total brand ada kata selain:
    // DEPARTMENT, STORE, COMPANY, DIVISION, OTHER
    const nonBrandKeywords = ["DEPARTMENT","STORE","COMPANY","DIVISION","OTHER"];
    for(const kw of nonBrandKeywords){
        if(txt.includes(kw)) return false; // Bukan brand total
    }

    return true; // Semua lain treat as brand total
}

// ===================== RENDER =====================
function render() {
    const tb = document.getElementById("tbody");
    tb.innerHTML = "";

    const filter = document.getElementById("typeFilter").value;
    const frag = document.createDocumentFragment();

    data.forEach(r => {

        if(!r.totalRow){
            if(filter==="outright" && r.type!=="Outright") return;
            if(filter==="csgnmnt" && r.type!=="Csgnmnt") return;
        }

        const tr = document.createElement("tr");

        if(r.totalRow){
            tr.classList.add("total-row");

            const brandTotal = isBrandTotal(r);
            let displayValues = [];

            if(brandTotal){
                // BRAND TOTAL → NO SHIFT
                displayValues = (r.values || []).map(v => fmt(v));
            } else {
                // ALL OTHER TOTALS (Department/Store/Company/Division/Other) → SHIFT
                displayValues.push("NA");                 // ACT QTY col7
                displayValues.push(fmt(r.values?.[0]));  // ACT COST col8
                displayValues.push(fmt(r.values?.[1]));  // ACT RETAIL col9
                displayValues.push(fmt(r.values?.[2]));  // ACT MO col10

                displayValues.push("NA");                 // RI QTY col11
                displayValues.push(fmt(r.values?.[3]));  // RI COST col12
                displayValues.push(fmt(r.values?.[4]));  // RI RETAIL col13
                displayValues.push(fmt(r.values?.[5]));  // RI MO col14

                displayValues.push("NA");                 // VAR QTY col15
                displayValues.push(fmt(r.values?.[6]));  // VAR COST col16
                displayValues.push(fmt(r.values?.[7]));  // VAR RETAIL col17
                displayValues.push(fmt(r.values?.[8]));  // VAR MO col18
            }

            tr.innerHTML = `
                <td colspan="6">${r.totalText} (${r.type})</td>
                ${displayValues.map(v => `<td>${v}</td>`).join("")}
            `;
            frag.appendChild(tr);
            return;
        }

        // NORMAL ROW
        if(r.dup) tr.classList.add("duplicate");

        tr.innerHTML = `
            <td>${r.dept}</td>
            <td>${r.department}</td>
            <td>${r.brand}</td>
            <td>${r.sku}</td>
            <td>${r.description}</td>
            <td>${r.type}</td>

            <td>${fmtInt(r.act_qty)}</td>
            <td>${fmt(r.act_cost)}</td>
            <td>${fmt(r.act_retail)}</td>
            <td>${fmt(r.act_mo)}</td>

            <td>${fmtInt(r.ri_qty)}</td>
            <td>${fmt(r.ri_cost)}</td>
            <td>${fmt(r.ri_retail)}</td>
            <td>${fmt(r.ri_mo)}</td>

            <td class="${Number(r.var_qty)<0?'neg':'pos'}">${Number(r.var_qty)===0?'-':fmtInt(r.var_qty)}</td>
            <td class="${Number(r.var_cost)<0?'neg':'pos'}">${Number(r.var_cost)===0?'-':fmt(r.var_cost)}</td>
            <td class="${Number(r.var_retail)<0?'neg':'pos'}">${Number(r.var_retail)===0?'-':fmt(r.var_retail)}</td>
            <td class="${Number(r.var_mo)<0?'neg':'pos'}">${Number(r.var_mo)===0?'-':fmt(r.var_mo)}</td>
        `;
        frag.appendChild(tr);
    });

    tb.appendChild(frag);
}

 

function applyStyles(ws, rows, isSummary=false){
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let R=0; R<=range.e.r; ++R){
        for(let C=0; C<=range.e.c; ++C){
            const cell_address = {c:C, r:R};
            const cell_ref = XLSX.utils.encode_cell(cell_address);
            const cell = ws[cell_ref];
            if(!cell) continue;

            // AUTO WIDTH
            ws['!cols'] = ws['!cols'] || [];
            ws['!cols'][C] = {wch: Math.max(ws['!cols'][C]?.wch||10, String(cell.v||"").length + 2)};

            // BORDERS
            cell.s = cell.s || {};
            cell.s.border = {
                top: {style:'thin', color:{auto:1}},
                bottom: {style:'thin', color:{auto:1}},
                left: {style:'thin', color:{auto:1}},
                right: {style:'thin', color:{auto:1}}
            };

            // BOLD TOTALS
            if(!isSummary && R>0 && String(cell.v).toUpperCase().includes("TOTAL")){
                cell.s.font = {bold:true};
            }
        }
    }
}


//======================================================================

function exportExcel() {

    const wb = XLSX.utils.book_new();

    const headers = [
        "dept","department","brand","sku","description","type",
        "act_qty","act_cost","act_retail","act_mo",
        "ri_qty","ri_cost","ri_retail","ri_mo",
        "var_qty","var_cost","var_retail","var_mo"
    ];

    // ===============================
    // 1. GET FILTER FROM UI
    // ===============================
    const filter = document.getElementById("typeFilter").value;

    const filteredData = data.filter(r => {
        if (r.totalRow) return true;

        if (filter === "both") return true;
        if (filter === "outright") return r.type === "Outright";
        if (filter === "csgnmnt") return r.type === "Csgnmnt";

        return true;
    });

    // ===============================
    // 2. PREPARE ALL ROWS
    // ===============================
    const allRows = filteredData.map(r => {

        if (!r.totalRow) return r;

        const brandTotal = isBrandTotal(r);

        if (brandTotal) {
            return {
                dept: r.dept || "",
                department: r.department || "",
                brand: r.brand || "",
                sku: r.sku || "",
                description: r.totalText || "",
                type: r.type,

                act_qty: r.values?.[0] || 0,
                act_cost: r.values?.[1] || 0,
                act_retail: r.values?.[2] || 0,
                act_mo: r.values?.[3] || 0,

                ri_qty: r.values?.[4] || 0,
                ri_cost: r.values?.[5] || 0,
                ri_retail: r.values?.[6] || 0,
                ri_mo: r.values?.[7] || 0,

                var_qty: r.values?.[8] || 0,
                var_cost: r.values?.[9] || 0,
                var_retail: r.values?.[10] || 0,
                var_mo: r.values?.[11] || 0
            };
        } else {
            return {
                dept: r.dept || "",
                department: r.department || "",
                brand: r.brand || "",
                sku: r.sku || "",
                description: r.totalText || "",
                type: r.type,

                act_qty: 0,
                act_cost: r.values?.[0] || 0,
                act_retail: r.values?.[1] || 0,
                act_mo: r.values?.[2] || 0,

                ri_qty: 0,
                ri_cost: r.values?.[3] || 0,
                ri_retail: r.values?.[4] || 0,
                ri_mo: r.values?.[5] || 0,

                var_qty: 0,
                var_cost: r.values?.[6] || 0,
                var_retail: r.values?.[7] || 0,
                var_mo: r.values?.[8] || 0
            };
        }
    });

    // ===============================
    // 3. ALL DATA SHEET
    // ===============================
    const wsAll = XLSX.utils.json_to_sheet(allRows, { header: headers });
    applyStyles(wsAll, allRows);
    XLSX.utils.book_append_sheet(wb, wsAll, "ALL DATA");

    // ===============================
    // 4. VARIANCE ONLY (var != 0)
    // ===============================
    const varRows = allRows
        .filter(r => r.var_qty !== 0 || r.var_cost !== 0 || r.var_retail !== 0 || r.var_mo !== 0)
        .map(r => ({
            dept: r.dept,
            department: r.department,
            brand: r.brand,
            sku: r.sku,
            description: r.description,
            type: r.type,
            var_qty: r.var_qty,
            var_cost: r.var_cost,
            var_retail: r.var_retail,
            var_mo: r.var_mo
        }));

    const wsVar = XLSX.utils.json_to_sheet(varRows, {
        header: ["dept","department","brand","sku","description","type","var_qty","var_cost","var_retail","var_mo"]
    });

    applyStyles(wsVar, varRows, true);
    XLSX.utils.book_append_sheet(wb, wsVar, "VARIANCE");

    // ===============================
    // 5. SUMMARY BY DEPARTMENT
    // ===============================
    const summaryMap = {};

    allRows.forEach(r => {
        const key = `${r.dept} - ${r.department}`;

        if (!summaryMap[key]) {
            summaryMap[key] = {
                dept: r.dept,
                department: r.department,
                act_qty: 0,
                act_cost: 0,
                ri_qty: 0,
                ri_cost: 0,
                var_qty: 0,
                var_cost: 0
            };
        }

        summaryMap[key].act_qty += r.act_qty || 0;
        summaryMap[key].act_cost += r.act_cost || 0;
        summaryMap[key].ri_qty += r.ri_qty || 0;
        summaryMap[key].ri_cost += r.ri_cost || 0;
        summaryMap[key].var_qty += r.var_qty || 0;
        summaryMap[key].var_cost += r.var_cost || 0;
    });

    const summaryRows = Object.values(summaryMap);

    const wsSummary = XLSX.utils.json_to_sheet(summaryRows, {
        header: ["dept","department","act_qty","act_cost","ri_qty","ri_cost","var_qty","var_cost"]
    });

    applyStyles(wsSummary, summaryRows, true);
    XLSX.utils.book_append_sheet(wb, wsSummary, "SUMMARY");

    // ===============================
    // 6. SHEET BY DEPT
    // ===============================
    const deptMap = {};

    allRows.forEach(r => {
        const key = `${r.dept || "NO"} - ${r.department || "NAME"}`;

        if (!deptMap[key]) deptMap[key] = [];
        deptMap[key].push(r);
    });

    Object.entries(deptMap).forEach(([name, rows]) => {

        const ws = XLSX.utils.json_to_sheet(rows, { header: headers });

        applyStyles(ws, rows, true);

        const safeName = name.substring(0, 31); // Excel limit

        XLSX.utils.book_append_sheet(wb, ws, safeName);
    });

    // ===============================
    // 7. EXPORT FILE
    // ===============================
    const today = new Date().toISOString().slice(0,10); // YYYY/MM/DD 

const exportName = `${fileName}_${today}.xlsx`;

XLSX.writeFile(wb, exportName);}
 
</script>
</body>
</html>
